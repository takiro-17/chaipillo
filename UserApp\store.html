<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store - SuperFit</title>
    <meta name="description" content="Shop premium protein powders, gym clothing, and fitness accessories on SuperFit Store.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app-container">
    <div class="page-header">
        <h1>Store</h1>
        <button class="btn-icon btn-icon-text" onclick="openCart()" id="headerCartBtn" style="position:relative;">
            Cart
            <span id="headerCartCount" style="position:absolute;top:-4px;right:-4px;width:18px;height:18px;background:var(--primary);color:white;font-size:0.65rem;font-weight:800;border-radius:50%;display:none;align-items:center;justify-content:center;">0</span>
        </button>
    </div>

    <div class="content-padding" style="margin-bottom:12px;">
        <div class="search-container">
            <span class="search-icon">Search</span>
            <input type="text" class="input-glass" id="storeSearch" placeholder="Search products..." oninput="filterProducts(this.value)" style="padding-left:72px;">
        </div>
    </div>

    <div class="content-padding" style="padding-top:0;">
        <div class="glass-card-static store-hero-card">
            <div>
                <div style="font-size:0.76rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:6px;">Store Picks</div>
                <div style="font-size:1.1rem;font-weight:800;margin-bottom:6px;">Gym gear that feels complete, not random</div>
                <div style="font-size:0.88rem;color:var(--text-secondary);line-height:1.6;">Shop supplements, apparel, and accessories with quick delivery notes, saved orders, and better product previews.</div>
            </div>
        </div>
    </div>

    <div class="content-padding" id="ordersSection" style="display:none;padding-top:0;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;">
            <h2 class="section-title" style="margin-bottom:0;">Recent Orders</h2>
            <button class="btn-glass" onclick="window.scrollTo({ top: 0, behavior: 'smooth' })" style="padding:8px 14px;">Back to Top</button>
        </div>
        <div id="ordersList"></div>
    </div>

    <div class="category-pills" id="categoryPills">
        <!-- Populated by JS -->
    </div>

    <div class="store-grid" id="productsGrid">
        <!-- Populated by JS -->
    </div>

    <div style="height:24px;"></div>
</div>

<button class="cart-fab hidden" id="cartFab" onclick="openCart()">
    Cart <span class="cart-count">0</span>
</button>

<div class="modal-overlay" id="cartModal">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
            <h2 style="font-size:1.3rem;font-weight:800;">Your Cart</h2>
            <button class="btn-icon btn-icon-text" onclick="closeCart()" style="height:36px;font-size:0.78rem;">Close</button>
        </div>
        <div id="cartItems">
            <!-- Populated by JS -->
        </div>
        <div id="cartFooter" style="display:none;">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-top:1px solid var(--border-glass);margin-top:12px;gap:14px;">
                <div>
                    <div style="font-size:0.8rem;color:var(--text-secondary);">Total</div>
                    <div style="font-size:1.4rem;font-weight:900;" id="cartTotalPrice">₹0</div>
                    <div style="font-size:0.75rem;color:var(--text-tertiary);margin-top:4px;">Delivery charges included in this demo</div>
                </div>
                <button class="btn-primary" onclick="checkout()" style="padding:14px 24px;">Checkout</button>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="productModal">
    <div class="modal-sheet" id="productModalContent">
        <!-- Populated by JS -->
    </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../shared-supabase-client.js"></script>
<script src="../shared-entry-bridge.js"></script>
<script src="app.js"></script>
<script>
    initApp('store');

    let activeCategory = 'all';
    let searchQuery = '';

    function escapeHtml(value) {
        return String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function renderCategories() {
        const container = document.getElementById('categoryPills');
        let html = '';
        CATEGORIES.forEach(category => {
            html += '<button class="btn-glass' + (category.id === activeCategory ? ' active' : '') + '" onclick="setCategory(\'' + category.id + '\', this)">' + escapeHtml(category.label) + '</button>';
        });
        container.innerHTML = html;
    }

    function setCategory(categoryId, button) {
        activeCategory = categoryId;
        document.querySelectorAll('#categoryPills .btn-glass').forEach(item => item.classList.remove('active'));
        button.classList.add('active');
        renderProducts();
    }

    function renderOrders() {
        const section = document.getElementById('ordersSection');
        const list = document.getElementById('ordersList');
        const orders = getOrders();

        if (!orders.length) {
            section.style.display = 'none';
            list.innerHTML = '';
            return;
        }

        section.style.display = 'block';
        let html = '';
        orders.slice(0, 3).forEach(order => {
            const firstItem = order.items[0];
            const itemLabel = order.items.length === 1
                ? firstItem.name
                : firstItem.name + ' +' + (order.items.length - 1) + ' more';

            html += '<div class="glass-card-static store-order-card">';
            html += '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;">';
            html += '<div>';
            html += '<div style="font-size:0.76rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:6px;">' + escapeHtml(order.id) + '</div>';
            html += '<div style="font-size:1rem;font-weight:800;margin-bottom:4px;">' + escapeHtml(itemLabel) + '</div>';
            html += '<div style="font-size:0.84rem;color:var(--text-secondary);">Placed on ' + new Date(order.createdAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) + '</div>';
            html += '</div>';
            html += '<div style="text-align:right;">';
            html += '<div class="badge badge-secondary" style="margin-bottom:8px;">' + escapeHtml(order.status) + '</div>';
            html += '<div style="font-size:1rem;font-weight:800;color:var(--secondary);">₹' + Number(order.total).toLocaleString() + '</div>';
            html += '</div>';
            html += '</div>';
            html += '<div class="store-order-meta">';
            html += '<span>' + order.items.reduce((sum, item) => sum + item.qty, 0) + ' items</span>';
            html += '<span>Delivery update soon</span>';
            html += '</div>';
            html += '</div>';
        });
        list.innerHTML = html;
    }

    function getFilteredProducts() {
        let filtered = PRODUCTS.slice();

        if (activeCategory !== 'all') {
            filtered = filtered.filter(product => product.category === activeCategory);
        }

        if (searchQuery) {
            const query = searchQuery.toLowerCase();
            filtered = filtered.filter(product =>
                product.name.toLowerCase().includes(query) ||
                product.brand.toLowerCase().includes(query) ||
                product.category.toLowerCase().includes(query)
            );
        }

        return filtered;
    }

    function renderProducts() {
        const grid = document.getElementById('productsGrid');
        const filtered = getFilteredProducts();

        if (!filtered.length) {
            grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">?</div><div class="empty-title">No products found</div><div class="empty-desc">Try a different search or category.</div></div>';
            return;
        }

        let html = '';
        filtered.forEach((product, index) => {
            const discount = getDiscount(product.originalPrice, product.price);
            const highlights = getProductHighlights(product);
            html += '<div class="product-card animate-in" style="animation-delay:' + (index * 0.05) + 's" onclick="openProductDetail(' + product.id + ')">';
            html += '<div class="product-image product-image-art">';
            html += '<img src="' + getProductArt(product) + '" alt="' + escapeHtml(product.name) + '" loading="lazy">';
            if (discount > 0) html += '<span class="discount-tag">-' + discount + '%</span>';
            html += '</div>';
            html += '<div class="product-body">';
            html += '<div class="product-brand">' + escapeHtml(product.brand) + '</div>';
            html += '<div class="product-name">' + escapeHtml(product.name) + '</div>';
            html += '<div class="product-helper-line">' + escapeHtml(getProductDeliveryText(product)) + '</div>';
            html += '<div class="product-price-row">';
            html += '<span class="product-price">₹' + Number(product.price).toLocaleString() + '</span>';
            html += '<span class="product-original-price">₹' + Number(product.originalPrice).toLocaleString() + '</span>';
            html += '</div>';
            html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;">';
            html += '<span style="color:var(--warning);font-size:0.8rem;">★ ' + escapeHtml(product.rating) + '</span>';
            html += '<span style="color:var(--text-tertiary);font-size:0.75rem;">(' + escapeHtml(product.reviews) + ')</span>';
            html += '</div>';
            html += '<div class="product-highlight-row">' + highlights.map(item => '<span class="product-highlight-pill">' + escapeHtml(item) + '</span>').join('') + '</div>';
            html += '<button class="add-cart-btn" onclick="event.stopPropagation(); quickAdd(' + product.id + ')">Add to Cart</button>';
            html += '</div></div>';
        });
        grid.innerHTML = html;
    }

    function filterProducts(query) {
        searchQuery = query.trim();
        renderProducts();
    }

    function quickAdd(productId) {
        const product = PRODUCTS.find(item => item.id === productId);
        if (!product) return;
        addToCart(productId, product.sizes[0]);
        updateHeaderCart();
    }

    function openProductDetail(productId) {
        const product = PRODUCTS.find(item => item.id === productId);
        if (!product) return;

        const discount = getDiscount(product.originalPrice, product.price);
        const highlights = getProductHighlights(product);
        let html = '<div class="modal-handle"></div>';
        html += '<div class="product-detail-art"><img src="' + getProductArt(product) + '" alt="' + escapeHtml(product.name) + '"></div>';
        html += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;">';
        html += '<span class="badge badge-accent">' + escapeHtml(product.brand) + '</span>';
        html += '<span class="badge badge-secondary">' + escapeHtml(product.category) + '</span>';
        if (discount > 0) html += '<span class="badge badge-primary">-' + discount + '% OFF</span>';
        html += '</div>';
        html += '<h2 style="font-size:1.3rem;font-weight:800;margin-bottom:8px;">' + escapeHtml(product.name) + '</h2>';
        html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">';
        html += '<span style="color:var(--warning);">★ ' + escapeHtml(product.rating) + '</span>';
        html += '<span style="color:var(--text-tertiary);font-size:0.85rem;">(' + escapeHtml(product.reviews) + ' reviews)</span>';
        html += '</div>';
        html += '<p style="color:var(--text-secondary);font-size:0.9rem;line-height:1.6;margin-bottom:12px;">' + escapeHtml(product.desc) + '</p>';
        html += '<div class="product-detail-highlights">' + highlights.map(item => '<span class="product-highlight-pill">' + escapeHtml(item) + '</span>').join('') + '</div>';
        html += '<div style="font-size:0.84rem;color:var(--text-secondary);margin-bottom:20px;">' + escapeHtml(getProductDeliveryText(product)) + '</div>';

        html += '<div style="margin-bottom:20px;">';
        html += '<div style="font-size:0.85rem;font-weight:600;margin-bottom:8px;color:var(--text-secondary);">Size / Variant</div>';
        html += '<div style="display:flex;gap:8px;flex-wrap:wrap;">';
        product.sizes.forEach((size, index) => {
            html += '<button class="btn-glass' + (index === 0 ? ' active' : '') + '" onclick="selectSize(this, ' + JSON.stringify(size) + ')" data-size="' + escapeHtml(size) + '" style="padding:8px 16px;font-size:0.82rem;">' + escapeHtml(size) + '</button>';
        });
        html += '</div></div>';

        html += '<div style="display:flex;align-items:center;justify-content:space-between;padding-top:16px;border-top:1px solid var(--border-glass);gap:12px;">';
        html += '<div><div style="font-size:0.75rem;color:var(--text-tertiary);text-decoration:line-through;">₹' + Number(product.originalPrice).toLocaleString() + '</div>';
        html += '<div style="font-size:1.5rem;font-weight:900;color:var(--secondary);">₹' + Number(product.price).toLocaleString() + '</div></div>';
        html += '<button class="btn-primary" onclick="addFromDetail(' + product.id + ')" style="padding:14px 24px;">Add to Cart</button>';
        html += '</div>';

        html += '<div style="text-align:center;margin-top:16px;"><button style="background:none;color:var(--text-tertiary);font-size:0.85rem;" onclick="closeProductDetail()">Close</button></div>';

        document.getElementById('productModalContent').innerHTML = html;
        document.getElementById('productModal').classList.add('active');
        window._selectedSize = product.sizes[0];
    }

    function selectSize(button, size) {
        button.parentElement.querySelectorAll('.btn-glass').forEach(item => item.classList.remove('active'));
        button.classList.add('active');
        window._selectedSize = size;
    }

    function addFromDetail(productId) {
        addToCart(productId, window._selectedSize || '');
        closeProductDetail();
        updateHeaderCart();
    }

    function closeProductDetail() {
        document.getElementById('productModal').classList.remove('active');
    }

    function openCart() {
        renderCartItems();
        document.getElementById('cartModal').classList.add('active');
    }

    function closeCart() {
        document.getElementById('cartModal').classList.remove('active');
    }

    function renderCartItems() {
        const cart = getCart();
        const container = document.getElementById('cartItems');
        const footer = document.getElementById('cartFooter');

        if (!cart.length) {
            container.innerHTML = '<div class="empty-state"><div class="empty-icon">Cart</div><div class="empty-title">Cart is empty</div><div class="empty-desc">Browse the store and add items to your cart.</div></div>';
            footer.style.display = 'none';
            return;
        }

        footer.style.display = 'block';
        let html = '';
        cart.forEach(item => {
            const product = PRODUCTS.find(entry => entry.id === item.id);
            if (!product) return;

            html += '<div class="cart-item-row">';
            html += '<div class="cart-item-art"><img src="' + getProductArt(product) + '" alt="' + escapeHtml(product.name) + '"></div>';
            html += '<div style="flex:1;">';
            html += '<div style="font-weight:600;font-size:0.9rem;">' + escapeHtml(product.name) + '</div>';
            html += '<div style="font-size:0.78rem;color:var(--text-tertiary);">' + escapeHtml(item.size || '') + ' · ₹' + Number(product.price).toLocaleString() + '</div>';
            html += '<div style="font-size:0.74rem;color:var(--text-tertiary);margin-top:4px;">' + escapeHtml(getProductDeliveryText(product)) + '</div>';
            html += '</div>';
            html += '<div class="qty-control">';
            html += '<button onclick="updateQty(' + item.id + ',' + JSON.stringify(item.size || '') + ',-1)">-</button>';
            html += '<span class="qty-value">' + item.qty + '</span>';
            html += '<button onclick="updateQty(' + item.id + ',' + JSON.stringify(item.size || '') + ',1)">+</button>';
            html += '</div>';
            html += '</div>';
        });
        container.innerHTML = html;
        document.getElementById('cartTotalPrice').textContent = '₹' + getCartTotal().toLocaleString();
    }

    function updateQty(productId, size, delta) {
        updateCartQty(productId, size, delta);
        renderCartItems();
        updateHeaderCart();
    }

    function checkout() {
        if (!isLoggedIn()) {
            closeCart();
            window.location.href = 'login.html?redirect=store.html';
            return;
        }

        const order = createOrderFromCart();
        if (!order) {
            showToast('Add at least one item before checkout.', 'warning');
            return;
        }

        localStorage.removeItem('superfit_cart');
        renderCartItems();
        updateCartUI();
        updateHeaderCart();
        renderOrders();
        closeCart();
        showToast('Order placed. Order ID: ' + order.id, 'success');
        location.hash = 'orders';
        scrollToOrdersIfRequested();
    }

    function updateHeaderCart() {
        const count = getCartCount();
        const badge = document.getElementById('headerCartCount');
        if (count > 0) {
            badge.style.display = 'flex';
            badge.textContent = count;
        } else {
            badge.style.display = 'none';
        }
    }

    function scrollToOrdersIfRequested() {
        if (location.hash !== '#orders') return;
        const section = document.getElementById('ordersSection');
        if (section && section.style.display !== 'none') {
            setTimeout(() => section.scrollIntoView({ behavior: 'smooth', block: 'start' }), 150);
        }
    }

    document.getElementById('cartModal').addEventListener('click', function(event) {
        if (event.target === this) closeCart();
    });

    document.getElementById('productModal').addEventListener('click', function(event) {
        if (event.target === this) closeProductDetail();
    });

    renderCategories();
    renderOrders();
    renderProducts();
    updateHeaderCart();
    scrollToOrdersIfRequested();
</script>

</body>
</html>
