<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Gym - SuperFit</title>
    <meta name="description" content="Track your gym membership, attendance, and live entry requests on SuperFit.">
    <link rel="stylesheet" href="styles.css?v=20260408-entry">
</head>
<body>

<div class="app-container">
    <div class="page-header">
        <h1>My Gym</h1>
        <button class="btn-icon btn-icon-text" onclick="window.location.href='profile.html'">Profile</button>
    </div>

    <div id="dashboardContent" class="content-padding">
        <!-- Populated by JS -->
    </div>
</div>

<div class="modal-overlay" id="entryModal">
    <div class="modal-sheet" style="text-align:center;">
        <div class="modal-handle"></div>
        <div style="font-size:1rem;margin-bottom:12px;color:var(--text-tertiary);letter-spacing:0.08em;text-transform:uppercase;">Live Entry Code</div>
        <h2 style="font-size:1.3rem;font-weight:800;margin-bottom:8px;">Use this code at the gym desk</h2>
        <p style="color:var(--text-secondary);font-size:0.88rem;margin-bottom:20px;">The owner dashboard needs this same code to approve your entry in real time.</p>
        <div id="otpDisplay" style="font-size:2.5rem;font-weight:900;letter-spacing:8px;padding:20px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:var(--radius-lg);margin-bottom:16px;color:var(--secondary);"></div>
        <p id="otpStatusText" style="color:var(--text-tertiary);font-size:0.78rem;margin-bottom:20px;">Keep this screen open until the gym confirms it.</p>
        <div class="entry-action-row" style="justify-content:center;">
            <button class="entry-code-action danger" id="entryModalCancelBtn" style="display:none;" onclick="cancelDashboardEntryRequest()">Cancel Code</button>
            <button class="btn-primary" style="padding:14px 32px;" onclick="closeEntryModal()">Done</button>
        </div>
    </div>
</div>

<button class="cart-fab hidden" id="cartFab" onclick="window.location.href='store.html'">
    Cart <span class="cart-count">0</span>
</button>

<div id="toastContainer" class="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../shared-supabase-client.js"></script>
<script src="../shared-entry-bridge.js"></script>
<script src="app.js"></script>
<script>
    initApp('dashboard');

    function getAttendanceDateSet(attendance) {
        return new Set(attendance.map(entry => String(entry.date || '')));
    }

    function calculateStreak(attendance) {
        const attendanceDates = getAttendanceDateSet(attendance);
        const today = new Date();
        const todayKey = getLocalDateKey(today);
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        const yesterdayKey = getLocalDateKey(yesterday);

        if (!attendanceDates.has(todayKey) && !attendanceDates.has(yesterdayKey)) {
            return 0;
        }

        let cursor = attendanceDates.has(todayKey) ? new Date(today) : yesterday;
        let streak = 0;

        while (attendanceDates.has(getLocalDateKey(cursor))) {
            streak++;
            cursor.setDate(cursor.getDate() - 1);
        }

        return streak;
    }

    function getLatestMembershipRequest(membership) {
        if (!membership) return null;
        const gymId = membership.supabaseGymId || membership.gymId;
        return getLatestEntryRequestForGym(gymId, ['pending', 'approved', 'rejected', 'cancelled', 'expired']);
    }

    function getDashboardMembershipGym(membership) {
        if (!membership) return null;
        return findCurrentMembershipGym() || {
            id: membership.gymId || null,
            supabaseGymId: membership.supabaseGymId || null,
            name: membership.gymName || ''
        };
    }

    function getDashboardOpenEntry(membership, attendanceOverride) {
        const membershipGym = getDashboardMembershipGym(membership);
        return membershipGym ? getOpenAttendanceEntryForGym(membershipGym, attendanceOverride) : null;
    }

    function getLatestRequestBadgeClass(request) {
        if (!request) return 'badge-accent';
        if (request.status === 'approved') return 'badge-secondary';
        if (request.status === 'rejected' || request.status === 'expired') return 'badge-primary';
        if (request.status === 'cancelled') return 'badge-warning';
        return 'badge-accent';
    }

    function getLatestRequestMessage(request) {
        if (!request) return '';

        const requestTime = new Date(request.requestedAt || request.updatedAt || Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        if (request.status === 'pending') {
            return 'Requested at ' + requestTime + '. Expires in ' + formatEntryRequestTimeLeft(request) + '. Wait for the gym owner dashboard to approve it.';
        }

        if (request.status === 'approved') {
            const openEntry = getDashboardOpenEntry((getUserData() || {}).membership || null);
            if (openEntry) {
                return 'Approved at ' + requestTime + '. You are still checked in from ' + openEntry.time + '. Ask the admin to mark your exit before requesting another code.';
            }
            return 'Approved at ' + requestTime + '. This visit has already been added to your attendance.';
        }

        if (request.status === 'cancelled') {
            return 'Requested at ' + requestTime + '. This code was cancelled by you. Request a fresh code when you are ready.';
        }

        if (request.status === 'expired') {
            return 'Requested at ' + requestTime + '. This code expired after 2 minutes. Request a fresh code now.';
        }

        return 'Requested at ' + requestTime + '. You can request a fresh code now.';
    }

    function renderLatestRequestActions(request) {
        if (!request || request.status !== 'pending') return '';
        return '<div class="entry-action-row" style="margin-top:12px;">'
            + '<button class="entry-code-action danger" onclick="cancelDashboardEntryRequest(\'' + request.id + '\')">Cancel Code</button>'
            + '</div>';
    }

    function syncRequestEntryButtonState(request) {
        const button = document.getElementById('requestEntryButton');
        if (!button) return;
        const membership = (getUserData() || {}).membership || null;
        const openEntry = getDashboardOpenEntry(membership);

        if (openEntry) {
            button.textContent = 'Awaiting Exit';
            button.disabled = true;
            button.style.opacity = '0.72';
            return;
        }

        button.disabled = false;
        button.style.opacity = '1';
        button.textContent = request && request.status === 'pending'
            ? 'Show Active Entry Code'
            : 'Request Entry Code';
    }

    function syncEntryModalState(request) {
        const otpStatusText = document.getElementById('otpStatusText');
        const otpDisplay = document.getElementById('otpDisplay');
        const cancelButton = document.getElementById('entryModalCancelBtn');
        if (!otpStatusText || !otpDisplay || !cancelButton) return;

        if (!request) {
            otpStatusText.textContent = 'Request a new code when you are ready to enter.';
            cancelButton.style.display = 'none';
            return;
        }

        otpDisplay.textContent = request.otp || '';

        if (request.status === 'pending') {
            otpStatusText.textContent = 'Waiting for approval in the owner dashboard. ' + formatEntryRequestTimeLeft(request) + '.';
            cancelButton.style.display = 'inline-flex';
            cancelButton.dataset.requestId = request.id;
            return;
        }

        cancelButton.style.display = 'none';

        if (request.status === 'approved') {
            otpStatusText.textContent = 'Entry approved. This request has already been synced to your attendance.';
        } else if (request.status === 'cancelled') {
            otpStatusText.textContent = 'This code was cancelled. Request a new one when you are ready.';
        } else if (request.status === 'expired') {
            otpStatusText.textContent = 'This code expired after 2 minutes. Request a new one.';
        } else {
            otpStatusText.textContent = 'This code is no longer active. Request a new one if needed.';
        }
    }

    function refreshLatestEntryRequestState(requestOverride) {
        const user = getUserData();
        const membership = user ? user.membership || null : null;
        const request = requestOverride || getLatestMembershipRequest(membership);
        const statusBadge = document.getElementById('latestEntryRequestStatus');
        const code = document.getElementById('latestEntryRequestCode');
        const note = document.getElementById('latestEntryRequestNote');
        const actions = document.getElementById('latestEntryRequestActions');

        syncRequestEntryButtonState(request);
        syncEntryModalState(request);

        if (!statusBadge || !code || !note || !actions || !request) return;

        statusBadge.className = 'badge ' + getLatestRequestBadgeClass(request);
        statusBadge.textContent = request.status;
        code.textContent = request.otp || '';
        note.textContent = getLatestRequestMessage(request);
        actions.innerHTML = renderLatestRequestActions(request);
    }

    function syncDashboardEntryTicker(shouldRun) {
        if (window.__dashboardEntryTicker) {
            clearInterval(window.__dashboardEntryTicker);
            window.__dashboardEntryTicker = null;
        }

        if (shouldRun) {
            window.__dashboardEntryTicker = setInterval(() => {
                refreshLatestEntryRequestState();
            }, 1000);
        }
    }

    function renderDashboard() {
        const container = document.getElementById('dashboardContent');

        if (!isLoggedIn()) {
            container.innerHTML =
                '<div class="empty-state" style="margin-top:40px;">' +
                    '<div class="empty-icon">Lock</div>' +
                    '<div class="empty-title">Sign in to view your gym</div>' +
                    '<div class="empty-desc">Track your membership, attendance, and live entry requests.</div>' +
                    '<br><a href="login.html?redirect=dashboard.html" class="btn-primary" style="display:inline-flex;">Sign In</a>' +
                '</div>';
            return;
        }

        syncApprovedEntryRequests();

        const user = getUserData();
        const attendance = getUserAttendance();
        const membership = user.membership || null;
        const now = new Date();
        const currentMonthKey = getLocalDateKey(now).slice(0, 7);
        const totalVisits = attendance.length;
        const thisMonth = attendance.filter(entry => String(entry.date || '').slice(0, 7) === currentMonthKey).length;
        const streak = calculateStreak(attendance);
        const latestRequest = getLatestMembershipRequest(membership);
        const openEntry = getDashboardOpenEntry(membership, attendance);

        let html = '';
        html += '<div style="margin-bottom:24px;">';
        html += '<h2 style="font-size:1.4rem;font-weight:800;margin-bottom:4px;">Hey, ' + user.name + '</h2>';
        html += '<p style="color:var(--text-secondary);font-size:0.88rem;">Here is your gym dashboard for today.</p>';
        html += '</div>';

        if (membership) {
            const expiry = new Date(membership.expiryDate);
            const daysLeft = Math.max(0, Math.ceil((expiry.getTime() - now.getTime()) / (1000 * 60 * 60 * 24)));
            const isExpired = !isMembershipActive(membership);
            const totalDays = Math.max(1, Math.ceil((expiry.getTime() - new Date(membership.startDate).getTime()) / (1000 * 60 * 60 * 24)));
            const progressPct = Math.min(100, Math.max(0, Math.round(((totalDays - daysLeft) / totalDays) * 100)));

            html += '<div class="membership-card" style="margin-bottom:18px;">';
            html += '<div style="display:flex;align-items:start;justify-content:space-between;gap:12px;">';
            html += '<div>';
            html += '<div class="plan-name">' + membership.plan + '</div>';
            html += '<div class="gym-info">' + membership.gymName + '</div>';
            html += '</div>';
            html += '<span class="badge ' + (isExpired ? 'badge-primary' : 'badge-secondary') + '">' + (isExpired ? 'Expired' : 'Active') + '</span>';
            html += '</div>';
            html += '<div style="margin:12px 0;">';
            html += '<div style="height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;">';
            html += '<div style="height:100%;width:' + progressPct + '%;background:linear-gradient(90deg,var(--secondary),var(--accent));border-radius:3px;transition:width 1s ease;"></div>';
            html += '</div></div>';
            html += '<div class="expiry-row">';
            html += '<div>';
            html += '<div class="days-left">' + daysLeft + '</div>';
            html += '<div class="days-label">days remaining</div>';
            html += '</div>';
            html += '<div style="text-align:right;">';
            html += '<div style="font-size:0.8rem;color:var(--text-tertiary);">Expires</div>';
            html += '<div style="font-size:0.95rem;font-weight:700;">' + expiry.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) + '</div>';
            html += '</div>';
            html += '</div>';
            html += '</div>';

            if (!isExpired) {
                html += '<button class="btn-primary" id="requestEntryButton" style="width:100%;padding:16px;margin-bottom:16px;font-size:1.02rem;' + (openEntry ? 'opacity:0.72;' : '') + '" onclick="requestEntryOTP()"' + (openEntry ? ' disabled' : '') + '>';
                html += latestRequest && latestRequest.status === 'pending'
                    ? 'Show Active Entry Code'
                    : (openEntry ? 'Awaiting Exit' : 'Request Entry Code');
                html += '</button>';
            } else {
                html += '<div class="glass-card-static dashboard-note-card" style="padding:16px;margin-bottom:16px;">';
                html += '<div style="font-weight:700;margin-bottom:6px;">Membership expired</div>';
                html += '<div style="font-size:0.88rem;color:var(--text-secondary);line-height:1.6;">Renew your plan from the gym profile before requesting entry again.</div>';
                html += '</div>';
            }

            if (latestRequest) {
                html += '<div class="glass-card-static dashboard-note-card" style="padding:16px;margin-bottom:20px;">';
                html += '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px;">';
                html += '<div style="font-weight:700;">Latest entry request</div>';
                html += '<span class="badge ' + getLatestRequestBadgeClass(latestRequest) + '" id="latestEntryRequestStatus">' + latestRequest.status + '</span>';
                html += '</div>';
                html += '<div id="latestEntryRequestCode" style="font-size:1.4rem;font-weight:900;color:var(--secondary);letter-spacing:4px;margin-bottom:8px;">' + latestRequest.otp + '</div>';
                html += '<div id="latestEntryRequestNote" style="font-size:0.84rem;color:var(--text-secondary);line-height:1.6;">' + getLatestRequestMessage(latestRequest) + '</div>';
                html += '<div id="latestEntryRequestActions">' + renderLatestRequestActions(latestRequest) + '</div>';
                html += '</div>';
            }
        } else {
            html += '<div class="glass-card-static" style="padding:28px;text-align:center;margin-bottom:24px;">';
            html += '<div style="font-size:3rem;margin-bottom:12px;">Gym</div>';
            html += '<h3 style="margin-bottom:8px;">No Active Membership</h3>';
            html += '<p style="color:var(--text-secondary);font-size:0.88rem;margin-bottom:16px;">Explore gyms nearby, claim a trial, or join a plan to unlock live entry requests.</p>';
            html += '<a href="index.html" class="btn-primary" style="display:inline-flex;">Explore Gyms</a>';
            html += '</div>';
        }

        html += '<h2 class="section-title">Your Stats</h2>';
        html += '<div class="stat-grid" style="margin-bottom:24px;">';
        html += '<div class="stat-card"><div class="stat-value" style="color:var(--secondary);">' + totalVisits + '</div><div class="stat-label">Total Visits</div></div>';
        html += '<div class="stat-card"><div class="stat-value" style="color:var(--accent);">' + thisMonth + '</div><div class="stat-label">This Month</div></div>';
        html += '<div class="stat-card"><div class="stat-value" style="color:var(--warning);">' + streak + '</div><div class="stat-label">Current Streak</div></div>';
        html += '<div class="stat-card"><div class="stat-value" style="color:var(--purple);">' + (totalVisits > 0 ? Math.round(totalVisits * 1.2) : 0) + '</div><div class="stat-label">Hours Trained</div></div>';
        html += '</div>';

        html += '<h2 class="section-title">Activity This Month</h2>';
        html += '<div style="margin-bottom:8px;display:flex;justify-content:space-between;">';
        ['S', 'M', 'T', 'W', 'T', 'F', 'S'].forEach(day => {
            html += '<div style="flex:1;text-align:center;font-size:0.7rem;color:var(--text-tertiary);font-weight:600;">' + day + '</div>';
        });
        html += '</div>';
        html += '<div class="heat-grid" style="margin-bottom:24px;">';

        const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
        const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0);

        for (let index = 0; index < firstDay.getDay(); index++) {
            html += '<div class="heat-cell" style="opacity:0;"></div>';
        }

        for (let day = 1; day <= lastDay.getDate(); day++) {
            const dateKey = getLocalDateKey(new Date(now.getFullYear(), now.getMonth(), day));
            const visits = attendance.filter(entry => entry.date === dateKey).length;
            const isToday = day === now.getDate();
            let level = '';
            if (visits === 1) level = 'level-1';
            else if (visits === 2) level = 'level-2';
            else if (visits >= 3) level = 'level-3';

            html += '<div class="heat-cell ' + level + (isToday ? ' today' : '') + '" title="' + dateKey + ': ' + visits + ' visit' + (visits !== 1 ? 's' : '') + '"></div>';
        }
        html += '</div>';

        html += '<h2 class="section-title">Recent Check-ins</h2>';
        if (!attendance.length) {
            html += '<div class="glass-card-static" style="padding:24px;text-align:center;color:var(--text-secondary);">';
            html += '<div style="font-size:2rem;margin-bottom:8px;">No visits yet</div>';
            html += 'Request entry at your gym to start building your attendance history.';
            html += '</div>';
        } else {
            attendance.slice(0, 10).forEach(entry => {
                html += '<div class="glass-card-static" style="padding:14px 18px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:12px;">';
                html += '<div style="display:flex;align-items:center;gap:12px;">';
                html += '<div style="width:40px;height:40px;border-radius:var(--radius-sm);background:var(--secondary-soft);display:flex;align-items:center;justify-content:center;font-size:0.9rem;">Visit</div>';
                html += '<div>';
                html += '<div style="font-weight:600;font-size:0.9rem;">' + entry.gymName + '</div>';
                html += '<div style="font-size:0.78rem;color:var(--text-tertiary);">' + new Date(entry.date + 'T00:00:00').toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) + '</div>';
                html += '</div></div>';
                html += '<div style="text-align:right;">';
                html += '<div style="font-size:0.88rem;font-weight:700;color:var(--secondary);">' + entry.time + '</div>';
                html += '</div>';
                html += '</div>';
            });
        }

        container.innerHTML = html;
        refreshLatestEntryRequestState(latestRequest);
        syncDashboardEntryTicker(!!(latestRequest && latestRequest.status === 'pending'));
    }

    async function requestEntryOTP() {
        const gym = findCurrentMembershipGym();
        if (!gym) {
            showToast('Your membership gym could not be found. Open the gym profile and try again.', 'warning');
            return;
        }

        const request = await createEntryRequest(gym);
        if (!request) return;

        document.getElementById('otpDisplay').textContent = request.otp;
        syncEntryModalState(request);
        document.getElementById('entryModal').classList.add('active');
        renderDashboard();
    }

    function cancelDashboardEntryRequest(requestId) {
        const activeRequest = requestId
            ? (getEntryBridge() ? getEntryBridge().getRequestById(requestId) : null)
            : getLatestMembershipRequest((getUserData() || {}).membership || null);

        if (!activeRequest || activeRequest.status !== 'pending') {
            refreshLatestEntryRequestState();
            showToast('There is no active entry code to cancel.', 'info');
            return;
        }

        const cancelled = cancelEntryRequest(activeRequest.id);
        if (!cancelled) return;

        refreshLatestEntryRequestState(cancelled);
        renderDashboard();
        showToast('Entry code cancelled. Request a new code when needed.', 'info');
    }

    function closeEntryModal() {
        document.getElementById('entryModal').classList.remove('active');
    }

    document.getElementById('entryModal').addEventListener('click', function(event) {
        if (event.target === this) closeEntryModal();
    });

    renderDashboard();
</script>

</body>
</html>
