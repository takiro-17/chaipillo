<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — SuperFit</title>
    <meta name="description" content="Manage your SuperFit profile, favorites, and settings.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app-container">

    <!-- Header -->
    <div class="page-header">
        <h1>👤 Profile</h1>
        <div></div>
    </div>

    <div id="profileContent" class="content-padding">
        <!-- Populated by JS -->
    </div>

</div>

<!-- Edit Profile Modal -->
<div class="modal-overlay" id="editModal">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <h2 style="font-size:1.3rem;font-weight:800;margin-bottom:20px;">✏️ Edit Profile</h2>
        
        <div style="margin-bottom:16px;">
            <label style="font-size:0.8rem;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:8px;">Name</label>
            <input type="text" class="input-glass" id="editName" placeholder="Your name" maxlength="60" autocomplete="name" oninput="this.value=this.value.replace(/[0-9]/g,'')">
        </div>
        <div style="margin-bottom:16px;">
            <label style="font-size:0.8rem;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:8px;">Phone</label>
            <input type="tel" class="input-glass" id="editPhone" placeholder="Phone number" maxlength="10" inputmode="numeric" autocomplete="tel" oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10)">
        </div>

        <div style="display:flex;gap:12px;margin-top:24px;">
            <button class="btn-secondary" style="flex:1;padding:14px;" onclick="closeEditModal()">Cancel</button>
            <button class="btn-primary" style="flex:1;padding:14px;" onclick="saveProfile()">Save Changes</button>
        </div>
    </div>
</div>

<!-- Favorites Modal -->
<div class="modal-overlay" id="favsModal">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <h2 style="font-size:1.3rem;font-weight:800;margin-bottom:20px;">❤️ Favorite Gyms</h2>
        <div id="favsList">
            <!-- Populated by JS -->
        </div>
        <div style="text-align:center;margin-top:16px;"><button style="background:none;color:var(--text-tertiary);font-size:0.85rem;" onclick="closeFavsModal()">Close</button></div>
    </div>
</div>

<!-- Cart FAB -->
<button class="cart-fab hidden" id="cartFab" onclick="window.location.href='store.html'">
    🛒 Cart <span class="cart-count">0</span>
</button>

<!-- Toast Container -->
<div id="toastContainer" class="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./shared-supabase-client.js"></script>
<script src="./shared-entry-bridge.js"></script>
<script src="app.js"></script>
<script>
    initApp('profile');

    function profileEscape(value) {
        return String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function renderProfile() {
        const container = document.getElementById('profileContent');

        if (!isLoggedIn()) {
            container.innerHTML = '<div class="empty-state" style="margin-top:40px;">' +
                '<div class="empty-icon">🔒</div>' +
                '<div class="empty-title">Sign in to view your profile</div>' +
                '<div class="empty-desc">Manage your account, favorites, and settings</div>' +
                '<br><a href="login.html?redirect=profile.html" class="btn-primary" style="display:inline-flex;">Sign In →</a>' +
            '</div>';
            return;
        }

        const user = getUserData();
        const favs = getFavorites();
        let html = '';

        // ── Profile Card ──
        html += '<div class="liquid-glass" style="padding:28px;margin-bottom:24px;text-align:center;">';
        html += '<div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--purple));display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 12px;box-shadow:0 8px 30px var(--primary-glow);">' + profileEscape(String(user.name || 'M').charAt(0).toUpperCase()) + '</div>';
        html += '<h2 style="font-size:1.3rem;font-weight:800;">' + profileEscape(user.name) + '</h2>';
        html += '<p style="color:var(--text-secondary);font-size:0.88rem;">📱 +91 ' + user.phone + '</p>';
        html += '<p style="color:var(--text-tertiary);font-size:0.78rem;margin-top:4px;">Member since ' + new Date(user.joinDate).toLocaleDateString('en-IN', { month: 'long', year: 'numeric' }) + '</p>';
        html += '<button class="btn-glass" style="margin-top:14px;padding:10px 20px;" onclick="openEditModal()">✏️ Edit Profile</button>';
        html += '</div>';

        // ── Quick Actions ──
        html += '<h2 class="section-title" style="margin-bottom:12px;">⚡ Quick Actions</h2>';

        html += '<div class="profile-item" onclick="openFavsModal()">';
        html += '<div class="profile-icon" style="background:var(--primary-soft);">❤️</div>';
        html += '<div class="profile-label">Favorite Gyms <span class="badge badge-primary" style="margin-left:8px;">' + favs.length + '</span></div>';
        html += '<span class="profile-arrow">›</span>';
        html += '</div>';

        html += '<div class="profile-item" onclick="window.location.href=\'dashboard.html\'">';
        html += '<div class="profile-icon" style="background:var(--secondary-soft);">📋</div>';
        html += '<div class="profile-label">My Membership</div>';
        html += '<span class="profile-arrow">›</span>';
        html += '</div>';

        html += '<div class="profile-item" onclick="window.location.href=\'store.html\'">';
        html += '<div class="profile-icon" style="background:var(--accent-soft);">🛍️</div>';
        html += '<div class="profile-label">My Orders</div>';
        html += '<span class="profile-arrow">›</span>';
        html += '</div>';

        html += '<div class="profile-item" onclick="showToast(\'Notifications enabled!\', \'info\')">';
        html += '<div class="profile-icon" style="background:var(--warning-soft);">🔔</div>';
        html += '<div class="profile-label">Notifications</div>';
        html += '<span class="profile-arrow">›</span>';
        html += '</div>';

        // ── App Settings ──
        html += '<h2 class="section-title" style="margin-top:28px;margin-bottom:12px;">⚙️ Settings</h2>';

        html += '<div class="profile-item" onclick="showToast(\'Language set to English\', \'info\')">';
        html += '<div class="profile-icon" style="background:var(--purple-soft);">🌐</div>';
        html += '<div class="profile-label">Language</div>';
        html += '<span style="color:var(--text-tertiary);font-size:0.85rem;">English</span>';
        html += '</div>';

        html += '<div class="profile-item" onclick="showToast(\'Help center coming soon!\', \'info\')">';
        html += '<div class="profile-icon" style="background:var(--accent-soft);">❓</div>';
        html += '<div class="profile-label">Help & Support</div>';
        html += '<span class="profile-arrow">›</span>';
        html += '</div>';

        html += '<div class="profile-item" onclick="showToast(\'SuperFit v1.0.0\', \'info\')">';
        html += '<div class="profile-icon" style="background:var(--bg-glass);">📱</div>';
        html += '<div class="profile-label">About SuperFit</div>';
        html += '<span style="color:var(--text-tertiary);font-size:0.85rem;">v1.0.0</span>';
        html += '</div>';

        // ── Logout ──
        html += '<div style="margin-top:32px;margin-bottom:24px;">';
        html += '<button class="btn-secondary" style="width:100%;padding:14px;border-color:rgba(255,90,95,0.3);color:var(--primary);" onclick="handleLogout()">🚪 Logout</button>';
        html += '</div>';

        // ── Danger Zone ──
        html += '<div style="padding:20px;border:1px solid rgba(255,90,95,0.15);border-radius:var(--radius-md);margin-bottom:24px;">';
        html += '<p style="color:var(--text-tertiary);font-size:0.82rem;margin-bottom:12px;">Delete your account and all associated data permanently.</p>';
        html += '<button style="background:none;color:var(--primary);font-size:0.85rem;font-weight:600;" onclick="deleteAccount()">Delete Account</button>';
        html += '</div>';

        container.innerHTML = html;
    }

    // ── Edit Profile ──
    function openEditModal() {
        const user = getUserData();
        document.getElementById('editName').value = user.name;
        document.getElementById('editPhone').value = user.phone;
        document.getElementById('editModal').classList.add('active');
    }
    function closeEditModal() {
        document.getElementById('editModal').classList.remove('active');
    }
    function saveProfile() {
        const name = document.getElementById('editName').value.trim();
        const phone = document.getElementById('editPhone').value.trim();
        if (!name) { showToast('Name is required!', 'warning'); return; }
        if (phone && phone.length !== 10) { showToast('Phone must be 10 digits!', 'warning'); return; }

        const user = getUserData();
        user.name = name;
        if (phone) user.phone = phone;
        saveUserData(user);
        closeEditModal();
        renderProfile();
        showToast('Profile updated! ✓', 'success');
    }

    // ── Favorites ──
    window.saveProfile = function() {
        const nameResult = validatePersonName(document.getElementById('editName').value);
        const phoneResult = validateIndianPhone(document.getElementById('editPhone').value);
        if (!nameResult.valid) { showToast(nameResult.message, 'warning'); return; }
        if (!phoneResult.valid) { showToast(phoneResult.message, 'warning'); return; }

        const user = getUserData();
        user.name = nameResult.value;
        user.phone = phoneResult.value;
        document.getElementById('editName').value = nameResult.value;
        document.getElementById('editPhone').value = phoneResult.value;
        saveUserData(user);
        closeEditModal();
        renderProfile();
        showToast('Profile updated.', 'success');
    };

    function openFavsModal() {
        const favs = getFavorites();
        const container = document.getElementById('favsList');
        
        if (favs.length === 0) {
            container.innerHTML = '<div class="empty-state"><div class="empty-icon">💔</div><div class="empty-title">No favorites yet</div><div class="empty-desc">Explore gyms and tap the heart to save them</div></div>';
        } else {
            let html = '';
            favs.forEach(gymId => {
                const gym = getGymById(gymId);
                if (!gym) return;
                html += '<div style="display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border-glass);cursor:pointer;" onclick="window.location.href=\'gym-profile.html?id=' + gym.id + '\'">';
                html += '<img src="' + gym.photo + '" style="width:56px;height:56px;border-radius:var(--radius-sm);object-fit:cover;">';
                html += '<div style="flex:1;">';
                html += '<div style="font-weight:700;font-size:0.95rem;">' + gym.name + '</div>';
                html += '<div style="font-size:0.8rem;color:var(--text-secondary);">📍 ' + gym.location + '</div>';
                html += '<div style="font-size:0.8rem;color:var(--warning);">⭐ ' + gym.rating + '</div>';
                html += '</div>';
                html += '<button class="btn-icon" style="width:36px;height:36px;font-size:0.9rem;" onclick="event.stopPropagation(); removeFav(' + gym.id + ')">✕</button>';
                html += '</div>';
            });
            container.innerHTML = html;
        }
        document.getElementById('favsModal').classList.add('active');
    }
    function closeFavsModal() {
        document.getElementById('favsModal').classList.remove('active');
    }
    function removeFav(gymId) {
        toggleFavorite(gymId);
        openFavsModal(); // Refresh
        renderProfile(); // Update count
    }

    // ── Logout ──
    function handleLogout() {
        logout();
    }

    // ── Delete Account ──
    function deleteAccount() {
        if (confirm('Are you sure? This will delete all your data permanently.')) {
            localStorage.removeItem('superfit_user');
            localStorage.removeItem('superfit_cart');
            localStorage.removeItem('superfit_favorites');
            localStorage.removeItem('superfit_trials');
            localStorage.removeItem('superfit_attendance');
            showToast('Account deleted', 'info');
            setTimeout(() => window.location.href = 'index.html', 1000);
        }
    }

    // Close modals on overlay click
    document.getElementById('editModal').addEventListener('click', function(e) { if (e.target === this) closeEditModal(); });
    document.getElementById('favsModal').addEventListener('click', function(e) { if (e.target === this) closeFavsModal(); });

    // Boot
    renderProfile();
</script>

</body>
</html>
