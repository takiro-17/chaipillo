<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperFit - Partner Registration</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
        (function() {
            var t = localStorage.getItem("superfit_theme") || "dark";
            if (t !== "light") document.documentElement.setAttribute("data-theme", "dark");
        })();
    </script>
</head>
<body>
    <div class="signup-container">
        <div class="brand">
            <div class="logo-clay">&#128170;</div>
            <h1>SuperFit</h1>
            <p>Join the Future of Gym Management</p>
        </div>

        <form class="clay-card" id="registerForm" novalidate>
            <h2>Become a Partner</h2>
            <p class="subtitle">Create an account with email/password or Google</p>

            <div id="registerModeNote" class="auth-inline-note"></div>

            <div class="input-group">
                <input type="text" id="gymName" required autocomplete="organization">
                <label for="gymName">Gym Name</label>
            </div>

            <div class="input-group">
                <input type="text" id="location" required autocomplete="address-level2">
                <label for="location">City &amp; Location</label>
            </div>

            <div class="input-group">
                <input type="tel" id="phone" required autocomplete="tel" maxlength="10" pattern="[0-9]{10}" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
                <label for="phone">Phone Number</label>
            </div>

            <div class="input-group">
                <input type="number" id="capacity" required autocomplete="off">
                <label for="capacity">Total Gym Capacity (Members)</label>
            </div>

            <div class="input-group">
                <input type="email" id="email" required autocomplete="email">
                <label for="email">Email Address</label>
            </div>

            <div class="input-group">
                <input type="password" id="RegPassword" required autocomplete="new-password">
                <label for="RegPassword">Password</label>
                <button type="button" class="toggle-password" onclick="togglePasswordVisibility('RegPassword', 'eyeIconReg')">
                    <svg id="eyeIconReg" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>

            <div id="regErrorBox" class="custom-error-msg"></div>
            <div id="regStatusBox" class="custom-success-msg"></div>

            <div class="auth-actions">
                <button type="submit" class="clay-button" id="createAccountBtn">
                    <span>Create Account</span>
                </button>
            </div>

            <div class="auth-divider"><span>or</span></div>
            <button type="button" class="clay-button-google" id="googleRegisterBtn">Continue With Google</button>

            <div class="demo-notice">
                <p>Already a partner? <a href="index.html">Log in here</a></p>
            </div>
        </form>

        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script>
        const registerForm = document.getElementById("registerForm");
        const registerModeNote = document.getElementById("registerModeNote");
        const regErrorBox = document.getElementById("regErrorBox");
        const regStatusBox = document.getElementById("regStatusBox");
        const createAccountBtn = document.getElementById("createAccountBtn");
        const googleRegisterBtn = document.getElementById("googleRegisterBtn");

        function clearBox(box) {
            box.innerText = "";
            box.style.display = "none";
        }

        function showRegisterError(msg, el) {
            clearBox(regStatusBox);
            regErrorBox.innerText = "Warning: " + msg;
            regErrorBox.style.display = "block";
            regErrorBox.style.animation = "none";
            regErrorBox.offsetHeight;
            regErrorBox.style.animation = "shake 0.4s ease-in-out";

            if (el) {
                el.classList.add("input-error");
                setTimeout(function() {
                    el.classList.remove("input-error");
                }, 400);
            }
        }

        function showRegisterStatus(msg) {
            clearBox(regErrorBox);
            regStatusBox.innerText = msg;
            regStatusBox.style.display = "block";
        }

        function rememberDefaultHtml(button) {
            if (!button.dataset.defaultHtml) {
                button.dataset.defaultHtml = button.innerHTML;
            }
        }

        function setButtonBusy(button, busyText, isBusy) {
            rememberDefaultHtml(button);
            button.disabled = isBusy;
            button.style.opacity = isBusy ? "0.8" : "1";
            button.innerHTML = isBusy ? "<span>" + busyText + "</span>" : button.dataset.defaultHtml;
        }

        function normalizeEmail(value) {
            return value.trim().toLowerCase();
        }

        function collectProfile(options) {
            const requireEmail = !options || options.requireEmail !== false;
            const requirePassword = !options || options.requirePassword !== false;

            const inputs = {
                gymName: document.getElementById("gymName"),
                location: document.getElementById("location"),
                phone: document.getElementById("phone"),
                capacity: document.getElementById("capacity"),
                email: document.getElementById("email"),
                password: document.getElementById("RegPassword")
            };

            Object.keys(inputs).forEach(function(key) {
                inputs[key].classList.remove("input-error");
            });

            const profile = {
                gymName: inputs.gymName.value.trim(),
                location: inputs.location.value.trim(),
                phone: inputs.phone.value.trim(),
                capacity: inputs.capacity.value.trim(),
                email: normalizeEmail(inputs.email.value),
                password: inputs.password.value
            };

            if (!profile.gymName) {
                showRegisterError("Gym name is required.", inputs.gymName);
                return null;
            }
            if (!profile.location) {
                showRegisterError("Location is required.", inputs.location);
                return null;
            }
            if (!/^\d{10}$/.test(profile.phone)) {
                showRegisterError("Phone number must be exactly 10 digits.", inputs.phone);
                return null;
            }
            if (!profile.capacity) {
                showRegisterError("Capacity is required.", inputs.capacity);
                return null;
            }
            if (requireEmail && !profile.email) {
                showRegisterError("Email is required.", inputs.email);
                return null;
            }
            if (profile.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(profile.email)) {
                showRegisterError("Enter a valid email address.", inputs.email);
                return null;
            }
            if (requirePassword && profile.password.length < 6) {
                showRegisterError("Password must be at least 6 characters.", inputs.password);
                return null;
            }

            return profile;
        }

        function buildOwnerData(profile, emailOverride) {
            return {
                gymName: profile.gymName,
                location: profile.location,
                phone: profile.phone,
                capacity: profile.capacity,
                email: emailOverride || profile.email || "",
                members: [],
                attendanceLog: [],
                communityMessages: []
            };
        }

        function buildMetadata(profile) {
            return {
                gym_name: profile.gymName,
                location: profile.location,
                phone: profile.phone,
                capacity: profile.capacity,
                app: "fitconnect_gym_owner"
            };
        }

        async function redirectIfLoggedIn() {
            const session = await window.requireSession();
            if (session) {
                window.location.href = "dashboard.html";
            }
        }

        registerForm.addEventListener("submit", async function(e) {
            e.preventDefault();

            clearBox(regErrorBox);
            clearBox(regStatusBox);

            const profile = collectProfile();
            if (!profile) return;

            const ownerData = buildOwnerData(profile, profile.email);
            window.cachePendingOwnerProfile(ownerData);

            const redirectTo = window.getHostedPageUrl("dashboard.html");
            setButtonBusy(createAccountBtn, "Creating Account...", true);

            try {
                const result = await window.supabaseAPI.auth.signUp({
                    email: profile.email,
                    password: profile.password,
                    options: {
                        emailRedirectTo: redirectTo || undefined,
                        data: buildMetadata(profile)
                    }
                });

                if (result.error) {
                    showRegisterError(result.error.message, document.getElementById("email"));
                    return;
                }

                const sessionResult = await window.supabaseAPI.auth.getSession();
                if (sessionResult.data && sessionResult.data.session) {
                    localStorage.setItem("fitconnect_owner", JSON.stringify(ownerData));
                    await window.saveToCloud(ownerData);
                    window.location.href = "dashboard.html";
                    return;
                }

                showRegisterStatus("Account created. Check your inbox to confirm your email, then come back and sign in.");
            } catch (error) {
                showRegisterError("Could not create your account right now. Please try again.");
            } finally {
                setButtonBusy(createAccountBtn, "", false);
            }
        });

        googleRegisterBtn.addEventListener("click", async function() {
            clearBox(regErrorBox);
            clearBox(regStatusBox);

            const profile = collectProfile({ requireEmail: false, requirePassword: false });
            const redirectTo = window.getHostedPageUrl("dashboard.html");

            if (!profile) return;
            if (!redirectTo) {
                showRegisterError("Google sign-up needs the app to run on http://localhost or a deployed https URL.");
                return;
            }

            const ownerData = buildOwnerData(profile, profile.email);
            ownerData.allowAnyEmail = true;
            window.cachePendingOwnerProfile(ownerData);

            setButtonBusy(googleRegisterBtn, "Redirecting To Google...", true);

            try {
                const result = await window.supabaseAPI.auth.signInWithOAuth({
                    provider: "google",
                    options: {
                        redirectTo: redirectTo
                    }
                });

                if (result.error) {
                    showRegisterError(result.error.message);
                    setButtonBusy(googleRegisterBtn, "", false);
                }
            } catch (error) {
                showRegisterError("Google sign-up could not start. Please try again.");
                setButtonBusy(googleRegisterBtn, "", false);
            }
        });

        function togglePasswordVisibility(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);

            if (input.type === "password") {
                input.type = "text";
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                input.type = "password";
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }

        if (!window.isHostedAuthContext()) {
            registerModeNote.innerText = "Google sign-up and email confirmation links need http://localhost. Run start-server.ps1 or start-server.cmd, then open http://localhost:8088/register.html.";
            registerModeNote.style.display = "block";
        }

        redirectIfLoggedIn();
    </script>
</body>
</html>
