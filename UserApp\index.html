<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperFit — Find Your Perfect Gym</title>
    <meta name="description" content="Discover the best gyms near you. Compare prices, read reviews, and claim free trials on SuperFit.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app-container">

    <!-- Header -->
    <div class="page-header">
        <div>
            <h1>SuperFit 💪</h1>
            <p style="font-size:0.8rem; color:var(--text-secondary); margin-top:2px;">Find your perfect gym</p>
        </div>
        <div style="display:flex; gap:8px;">
            <button class="btn-icon" onclick="window.location.href='store.html'" id="storeBtn">🛍️</button>
            <button class="btn-icon" id="profileHeaderBtn" onclick="window.location.href=isLoggedIn()?'profile.html':'login.html'">👤</button>
        </div>
    </div>

    <!-- Search Bar -->
    <div class="content-padding" style="margin:16px 0;">
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" class="input-glass" id="gymSearch" placeholder="Search gyms, locations..." oninput="filterGyms(this.value)" style="padding-left:48px;">
        </div>
    </div>

    <!-- Category Filter -->
    <div class="scroll-row" style="margin-bottom:8px;" id="locationFilters">
        <button class="btn-glass active" data-filter="all" onclick="filterByLocation('all',this)">📍 All Nearby</button>
        <button class="btn-glass" data-filter="andheri" onclick="filterByLocation('andheri',this)">Andheri</button>
        <button class="btn-glass" data-filter="bandra" onclick="filterByLocation('bandra',this)">Bandra</button>
        <button class="btn-glass" data-filter="powai" onclick="filterByLocation('powai',this)">Powai</button>
        <button class="btn-glass" data-filter="juhu" onclick="filterByLocation('juhu',this)">Juhu</button>
        <button class="btn-glass" data-filter="dadar" onclick="filterByLocation('dadar',this)">Dadar</button>
        <button class="btn-glass" data-filter="goregaon" onclick="filterByLocation('goregaon',this)">Goregaon</button>
    </div>

    <!-- Offers Carousel -->
    <div class="content-padding" style="margin-bottom:8px;">
        <h2 class="section-title">🔥 Hot Offers</h2>
    </div>
    <div class="scroll-row" id="offersRow" style="margin-bottom:24px;">
        <!-- Populated by JS -->
    </div>

    <!-- Gym Cards -->
    <div class="content-padding">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
            <h2 class="section-title" style="margin-bottom:0;">🏋️ Gyms Near You</h2>
            <span style="font-size:0.8rem; color:var(--text-tertiary);" id="gymCountLabel">6 found</span>
        </div>
    </div>

    <div class="content-padding" id="gymList">
        <!-- Populated by JS -->
    </div>

</div>

<!-- Cart FAB -->
<button class="cart-fab hidden" id="cartFab" onclick="window.location.href='store.html'">
    🛒 Cart <span class="cart-count">0</span>
</button>

<!-- Toast Container -->
<div id="toastContainer" class="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../shared-supabase-client.js"></script>
<script src="../shared-entry-bridge.js"></script>
<script src="app.js"></script>
<script>
    // ──── INIT ────
    initApp('explore');

    // ──── RENDER OFFERS ────
    function renderOffers() {
        const container = document.getElementById('offersRow');
        const allOffers = [];
        
        // Collect all offers from gyms
        GYMS.forEach(gym => {
            gym.offers.forEach(offer => {
                allOffers.push({ ...offer, gymName: gym.name, gymId: gym.id });
            });
        });

        // Add free trial offer
        allOffers.unshift({
            title: '3 Days FREE Trial',
            desc: 'Try any gym for free, no commitment',
            code: 'AUTO-APPLIED',
            gradient: 'gradient-2',
            gymName: 'All Gyms',
            gymId: null
        });

        let html = '';
        allOffers.forEach((offer, i) => {
            html += '<div class="offer-card ' + offer.gradient + '" onclick="' + (offer.gymId ? "window.location.href='gym-profile.html?id=" + offer.gymId + "'" : '') + '" style="cursor:pointer;">' +
                '<div class="offer-title">' + offer.title + '</div>' +
                '<div class="offer-desc">' + offer.desc + '</div>' +
                '<div style="display:flex; justify-content:space-between; align-items:center;">' +
                    '<span class="offer-code">Code: ' + offer.code + '</span>' +
                    '<span style="font-size:0.75rem; color:rgba(255,255,255,0.7);">' + offer.gymName + '</span>' +
                '</div>' +
            '</div>';
        });
        container.innerHTML = html;
    }

    // ──── RENDER GYM CARDS ────
    function renderGyms(gymsToShow) {
        const container = document.getElementById('gymList');
        const countLabel = document.getElementById('gymCountLabel');

        if (!gymsToShow) gymsToShow = GYMS;
        countLabel.textContent = gymsToShow.length + ' found';

        if (gymsToShow.length === 0) {
            container.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">No gyms found</div><div class="empty-desc">Try a different search or location filter</div></div>';
            return;
        }

        let html = '';
        gymsToShow.forEach((gym, i) => {
            const favClass = isFavorite(gym.id) ? '❤️' : '🤍';
            const trialBadge = gym.trialAvailable ? '<span class="badge badge-free">FREE TRIAL</span>' : '';
            
            html += '<div class="gym-card animate-in" style="animation-delay:' + (i * 0.07) + 's" onclick="window.location.href=\'gym-profile.html?id=' + encodeURIComponent(gym.supabaseGymId || gym.id) + '\'">' +
                '<div class="gym-image-container">' +
                    '<img class="gym-image" src="' + gym.photo + '" alt="' + gym.name + '" loading="lazy">' +
                    '<div class="gym-image-overlay">' +
                        trialBadge +
                        '<button class="btn-icon" style="width:36px;height:36px;font-size:0.9rem;background:rgba(0,0,0,0.4);border:none;" onclick="event.stopPropagation(); toggleFavBtn(' + gym.id + ', this)">' + favClass + '</button>' +
                    '</div>' +
                '</div>' +
                '<div class="gym-card-body">' +
                    '<div class="gym-name">' + gym.name + '</div>' +
                    '<div class="gym-location">📍 ' + gym.location + ' · ' + gym.distance + '</div>' +
                    '<div class="gym-meta">' +
                        '<div class="gym-rating">⭐ ' + gym.rating + ' <span style="color:var(--text-tertiary); font-weight:400;">(' + gym.reviewCount + ')</span></div>' +
                        '<div class="gym-price">' + gym.priceRange + '/mo</div>' +
                        '<div class="gym-distance">👥 ' + gym.memberCount + ' members</div>' +
                    '</div>' +
                    '<div class="gym-tags">' +
                        gym.amenities.slice(0, 4).map(a => '<span class="gym-tag">' + a + '</span>').join('') +
                        (gym.amenities.length > 4 ? '<span class="gym-tag">+' + (gym.amenities.length - 4) + ' more</span>' : '') +
                    '</div>' +
                '</div>' +
            '</div>';
        });
        container.innerHTML = html;
    }

    // ──── TOGGLE FAVORITE ────
    function toggleFavBtn(gymId, btn) {
        const isFav = toggleFavorite(gymId);
        btn.textContent = isFav ? '❤️' : '🤍';
    }

    // ──── SEARCH FILTER ────
    function filterGyms(query) {
        if (!query.trim()) {
            renderGyms(GYMS);
            return;
        }
        const q = query.toLowerCase();
        const filtered = GYMS.filter(g =>
            g.name.toLowerCase().includes(q) ||
            g.location.toLowerCase().includes(q) ||
            g.amenities.some(a => a.toLowerCase().includes(q))
        );
        renderGyms(filtered);
    }

    // ──── LOCATION FILTER ────
    function filterByLocation(location, btn) {
        // Update active state
        document.querySelectorAll('#locationFilters .btn-glass').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        if (location === 'all') {
            renderGyms(GYMS);
        } else {
            const filtered = GYMS.filter(g => g.location.toLowerCase().includes(location.toLowerCase()));
            renderGyms(filtered);
        }
    }

    // ──── BOOT ────
    renderOffers();
    renderGyms();
</script>

</body>
</html>
